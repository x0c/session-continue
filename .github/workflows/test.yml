name: test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile pickup.py scan_claude.py scan_codex.py scan_opencode.py scan_kimi.py scan_common.py titles.py titlegen.py models.py agent_api.py keepalive.py embed.py runtime/*.py test_*.py
      - name: Test
        run: python -m unittest -v
