name: test

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python-version: "3.10" }
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: ubuntu-latest, python-version: "3.13" }
          - { os: ubuntu-latest, python-version: "3.14" }
          - { os: macos-latest, python-version: "3.10" }
          - { os: macos-latest, python-version: "3.14" }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project and runtime dependencies
        run: python -m pip install .
      - name: Compile
        run: python -m compileall -q src/pickup tests
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Verify native accelerator
        run: python -c "from pickup.native import available; assert available()"
