name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要同步到 Homebrew 配方的版本 tag（如 v0.3.0）"
        required: true

jobs:
  bump-homebrew-formula:
    runs-on: ubuntu-latest
    steps:
      # 不再用 mislav/bump-homebrew-formula-action：GitHub 从 2026-05-16 起
      # tarball 端点对 HEAD 请求改答 303（原来是 302），该 action 只认严格
      # 相等的 302，导致每次都以 "unexpected HTTP 303 response" 失败。
      # 上游修复 PR（mislav/bump-homebrew-formula-action#342）尚未合并/发版，
      # 改用 curl + git 直接更新配方，不依赖该 action 的重定向处理逻辑。
      # 参考：https://github.com/mislav/bump-homebrew-formula-action/issues/340
      - name: Bump Homebrew formula
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${VERSION#v}"
          download_url="https://github.com/x0c/pickup/archive/refs/tags/${VERSION}.tar.gz"
          sha256=$(curl -fsSL "$download_url" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/x0c/homebrew-tap.git" tap
          cd tap

          formula="Formula/pickup.rb"
          sed -i \
            -e "s#^  url \".*\"#  url \"${download_url}\"#" \
            -e "s#^  sha256 \".*\"#  sha256 \"${sha256}\"#" \
            "$formula"

          if git diff --quiet -- "$formula"; then
            echo "配方已是最新版本，无需提交"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$formula"
          git commit -m "pickup ${version}"
          git push origin main
